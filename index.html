<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android File Merger</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            text-align: center; 
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: auto;
        }
        button { 
            margin-top: 20px; 
            padding: 15px 20px; 
            font-size: 16px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            width: 100%;
        }
        input[type="file"] { 
            margin-top: 20px; 
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>File Merger</h2>
        <p>Select multiple text files to combine them into one.</p>
        
        <input type="file" id="fileInput" multiple accept=".txt,text/*"><br>
        
        <button onclick="mergeFiles()">Merge & Download</button>
    </div>

    <script>
        async function mergeFiles() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;

            if (files.length === 0) {
                alert("Please tap 'Choose Files' and select something first!");
                return;
            }

            let mergedText = "";

            // Loop through all selected files and read their text
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const text = await file.text(); 
                
                // Add a divider and the file name so you know where each file starts
                mergedText += `\n\n========================================\n`;
                mergedText += `--- ${file.name} ---\n`;
                mergedText += `========================================\n\n`;
                mergedText += text;
            }

            // Create a downloadable file in the browser
            const blob = new Blob([mergedText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            // Trigger the Android download manager
            const a = document.createElement('a');
            a.href = url;
            a.download = "Combined_Files.txt";
            document.body.appendChild(a);
            a.click();
            
            // Clean up
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
