<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Army Tool</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --accent-color: #007aff;
            --text-color: #e0e0e0;
            --ribbon-height: 60px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* --- Ribbon Toolbar --- */
        .ribbon {
            height: var(--ribbon-height);
            background: var(--panel-color);
            display: flex;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #333;
            scrollbar-width: none; /* Firefox */
        }
        .ribbon::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .ribbon button {
            flex: 0 0 auto;
            height: 40px;
            margin: 0 10px;
            padding: 0 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ribbon button:hover { background: var(--accent-color); }
        .ribbon button.cmd-btn { background: #444; font-weight: bold; border: 1px solid var(--accent-color); }

        /* --- Main Content Area --- */
        #content-frame {
            width: 100%;
            height: calc(100vh - var(--ribbon-height));
            border: none;
            background: #fff;
        }

        /* --- Command Prompt (Bottom Slide-up) --- */
        #cmd-prompt {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            background: #000;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            border-top: 2px solid var(--accent-color);
        }
        #cmd-prompt.active { transform: translateY(0); }
        #cmd-output {
            flex: 1;
            padding: 10px;
            font-family: 'Courier New', monospace;
            overflow-y: auto;
            color: #0f0;
            font-size: 14px;
        }
        #cmd-input {
            background: #111;
            border: none;
            border-top: 1px solid #333;
            color: #0f0;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
        }

        /* --- Side Panels --- */
        .side-panel {
            position: fixed;
            top: var(--ribbon-height);
            bottom: 0;
            width: 250px;
            background: var(--panel-color);
            transition: transform 0.3s ease;
            z-index: 900;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        #left-panel { left: 0; transform: translateX(-100%); border-right: 1px solid #333; }
        #right-panel { right: 0; transform: translateX(100%); border-left: 1px solid #333; }
        
        .side-panel.active { transform: translateX(0); }

        /* --- Swipe/Hover Triggers --- */
        .trigger {
            position: fixed;
            top: var(--ribbon-height);
            bottom: 0;
            width: 15px;
            z-index: 950;
        }
        #left-trigger { left: 0; }
        #right-trigger { right: 0; }
    </style>
</head>
<body>

    <div class="ribbon">
        <button class="cmd-btn" onclick="toggleCMD()">CMD</button>
        <script>
            for(let i=1; i<=8; i++) {
                document.write(`<button onclick="loadTool(${i})">Tool ${i}</button>`);
            }
        </script>
    </div>

    <iframe id="content-frame" src="about:blank"></iframe>

    <div id="cmd-prompt">
        <div id="cmd-output">System Ready... Type 'help' for options.</div>
        <input type="text" id="cmd-input" placeholder="Enter command or paste script..." autocomplete="off" onkeydown="handleCmd(event)">
    </div>

    <div id="left-panel" class="side-panel"><h3>Left Menu</h3><p>Options will go here.</p></div>
    <div id="right-panel" class="side-panel"><h3>Right Menu</h3><p>Settings will go here.</p></div>

    <div id="left-trigger" class="trigger" onmouseenter="togglePanel('left', true)"></div>
    <div id="right-trigger" class="trigger" onmouseenter="togglePanel('right', true)"></div>

    <script>
        // --- Core UI Functions ---
        function loadTool(id) {
            document.getElementById('content-frame').src = `tools/${id}.html`;
        }

        function toggleCMD() {
            const prompt = document.getElementById('cmd-prompt');
            prompt.classList.toggle('active');
            if(prompt.classList.contains('active')) {
                document.getElementById('cmd-input').focus();
            }
        }

        function togglePanel(side, show) {
            const panel = document.getElementById(`${side}-panel`);
            if (show) {
                panel.classList.add('active');
            }
        }

        // Close panels when interacting with the main iframe
        document.getElementById('content-frame').addEventListener('mouseenter', () => {
            document.getElementById('left-panel').classList.remove('active');
            document.getElementById('right-panel').classList.remove('active');
        });

        // --- Terminal & Bootloader Logic ---
        let lastSuccessfulCommand = "";

        // Bootloader: Runs automatically when the page loads
        window.addEventListener('DOMContentLoaded', () => {
            const scripts = JSON.parse(localStorage.getItem('swissArmyScripts') || '[]');
            let loadedCount = 0;
            
            scripts.forEach((script, index) => {
                try {
                    eval(script);
                    loadedCount++;
                } catch (e) {
                    console.error(`Error loading saved script [${index}]:`, e);
                }
            });

            if (loadedCount > 0) {
                const output = document.getElementById('cmd-output');
                output.innerHTML += `<div style="color:#0aa;">System booted. Loaded ${loadedCount} saved script(s).</div>`;
            }
        });

        // CMD Handler
        function handleCmd(e) {
            if (e.key === 'Enter') {
                const input = e.target.value.trim();
                if (!input) return;

                const output = document.getElementById('cmd-output');
                
                // Echo the command
                const cmdEcho = document.createElement('div');
                cmdEcho.style.color = '#fff';
                cmdEcho.textContent = `> ${input}`;
                output.appendChild(cmdEcho);
                
                // Built-in Commands
                if (input === 'clear') {
                    output.innerHTML = 'System Ready...<br>';
                } 
                else if (input === 'help') {
                    output.innerHTML += `
                        <div>Available Commands:</div>
                        <div>- <b>clear</b>: Clears the terminal</div>
                        <div>- <b>save</b>: Saves the last executed script permanently</div>
                        <div>- <b>list</b>: Shows all saved scripts</div>
                        <div>- <b>remove [index]</b>: Deletes a saved script (e.g., 'remove 0')</div>
                        <div>- <b>help</b>: Shows this message</div>
                    `;
                }
                else if (input === 'save') {
                    if (lastSuccessfulCommand) {
                        const scripts = JSON.parse(localStorage.getItem('swissArmyScripts') || '[]');
                        scripts.push(lastSuccessfulCommand);
                        localStorage.setItem('swissArmyScripts', JSON.stringify(scripts));
                        output.innerHTML += '<div style="color:#0f0;">> Success: Previous script saved to bootloader!</div>';
                    } else {
                        output.innerHTML += '<div style="color:#ff4444;">> Error: No recent successful script to save.</div>';
                    }
                }
                else if (input === 'list') {
                    const scripts = JSON.parse(localStorage.getItem('swissArmyScripts') || '[]');
                    if (scripts.length === 0) {
                        output.innerHTML += '<div style="color:#aaa;">> No scripts currently saved.</div>';
                    } else {
                        scripts.forEach((s, i) => {
                            output.innerHTML += `<div style="color:#aaa;">[${i}] ${s.substring(0, 40)}...</div>`;
                        });
                    }
                }
                else if (input.startsWith('remove ')) {
                    const index = parseInt(input.split(' ')[1]);
                    const scripts = JSON.parse(localStorage.getItem('swissArmyScripts') || '[]');
                    if (!isNaN(index) && index >= 0 && index < scripts.length) {
                        scripts.splice(index, 1);
                        localStorage.setItem('swissArmyScripts', JSON.stringify(scripts));
                        output.innerHTML += `<div style="color:#0f0;">> Script [${index}] removed. Reload page to apply.</div>`;
                    } else {
                        output.innerHTML += '<div style="color:#ff4444;">> Error: Invalid script index. Check the "list" command.</div>';
                    }
                }
                else {
                    // Execute Raw JavaScript
                    try {
                        const result = eval(input);
                        lastSuccessfulCommand = input; // Capture for the 'save' command
                        
                        if (result !== undefined) {
                            const resultLine = document.createElement('div');
                            resultLine.style.color = '#aaa';
                            resultLine.textContent = `< ${String(result)}`;
                            output.appendChild(resultLine);
                        }
                    } catch (error) {
                        const errorLine = document.createElement('div');
                        errorLine.style.color = '#ff4444';
                        errorLine.textContent = `Error: ${error.message}`;
                        output.appendChild(errorLine);
                    }
                }

                // Clean up UI
                e.target.value = '';
                output.scrollTop = output.scrollHeight;
            }
        }
    </script>
</body>
</html>
