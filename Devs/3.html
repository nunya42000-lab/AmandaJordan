<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <title>DevOS Nexus Prime v4.0</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --surface: #21262d;
            --border: #30363d; --text: #c9d1d9; --accent: #2f81f7;
            --success: #3fb950; --warn: #d29922; --danger: #f85149;
            --gold: #d29922; --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --gutter-bg: #0d1117; --gutter-text: #484f58;
        }

        body.outdoor-mode {
            --bg: #ffffff; --panel: #f0f0f0; --surface: #e0e0e0;
            --border: #000000; --text: #000000; --accent: #004dc7; --gold: #855d00;
            --gutter-bg: #f6f8fa; --gutter-text: #57606a;
        }

        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-ui); overflow: hidden; touch-action: none; }
        #app-root { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }

        /* UI Components */
        #ribbon-toolbar { height: 50px; background: var(--panel); border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        #ribbon-toolbar::-webkit-scrollbar { display: none; }
        .ribbon-track { display: inline-flex; align-items: center; height: 100%; padding: 0 10px; gap: 8px; }
        .tool-btn { padding: 6px 14px; border-radius: 15px; background: var(--surface); color: var(--text); border: 1px solid var(--border); font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn-gold { color: var(--gold); border-color: var(--gold); }
        .btn-red { color: var(--danger); border-color: var(--danger); }

        /* Editor Architecture */
        #editor-container { flex: 1; display: flex; overflow: hidden; background: #000; position: relative; }
        body.outdoor-mode #editor-container { background: #fff; }
        #gutter { width: 45px; background: var(--gutter-bg); border-right: 1px solid var(--border); color: var(--gutter-text); font-family: monospace; font-size: 12px; padding-top: 15px; text-align: right; padding-right: 10px; line-height: 20px; pointer-events: none; overflow: hidden; }
        #editor-wrapper { flex: 1; position: relative; }
        #raw-terminal { width: 100%; height: 100%; background: transparent; color: inherit; border: none; padding: 15px; font-family: 'Courier New', monospace; font-size: 14px; line-height: 20px; outline: none; resize: none; tab-size: 2; white-space: pre; overflow: auto; }

        /* Panels */
        .side-panel { position: fixed; top: 0; bottom: 0; width: 85vw; max-width: 350px; background: var(--panel); border: 1px solid var(--border); z-index: 2000; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; }
        .left-panel { left: 0; transform: translateX(-105%); border-right: 2px solid var(--gold); }
        .right-panel { right: 0; transform: translateX(105%); border-left: 2px solid var(--accent); }
        .side-panel.open { transform: translateX(0); }
        .panel-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-content { flex: 1; padding: 15px; overflow-y: auto; font-family: monospace; }

        #status-bar { height: 25px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; font-size: 10px; font-family: monospace; gap: 20px; color: var(--gutter-text); }
        #cmd-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: flex-start; justify-content: center; padding-top: 15vh; }
        #cmd-prompt { width: 90%; background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 15px; display: flex; align-items: center; }
        #cmd-input { flex: 1; background: transparent; border: none; color: #fff; font-family: monospace; font-size: 16px; outline: none; }

        .intel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="cmd-overlay"><div id="cmd-prompt"><span style="color:var(--success);margin-right:10px;">nexus&gt;</span><input type="text" id="cmd-input"></div></div>

    <aside id="panel-left" class="side-panel left-panel">
        <div class="panel-header"><span style="color:var(--gold)">EXPLORER</span><button class="close-btn" data-target="panel-left" style="background:none;border:none;color:inherit;font-size:24px;">&times;</button></div>
        <div class="panel-content">
            <div style="margin-bottom: 20px;">
                <div style="font-size: 10px; color: var(--gold); margin-bottom: 8px; letter-spacing: 1px;">MANAGEMENT</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px;">
                    <button class="tool-btn" id="btn-import">Import</button>
                    <button class="tool-btn" id="btn-export">Export</button>
                </div>
                <button class="tool-btn btn-gold" style="width: 100%; padding: 10px;" id="btn-medic">🩹 MEDIC: REPAIR FILE</button>
            </div>
            <div id="file-list">
                <div style="font-size: 10px; opacity: 0.5; margin-bottom: 8px;">WORKSPACE</div>
                <div class="intel-card" style="border-left: 2px solid var(--gold);">nexus_core.js</div>
            </div>
        </div>
    </aside>

    <aside id="panel-right" class="side-panel right-panel">
        <div class="panel-header"><span style="color:var(--accent)">SENTINEL INTEL</span><button class="close-btn" data-target="panel-right" style="background:none;border:none;color:inherit;font-size:24px;">&times;</button></div>
        <div class="panel-content">
            <div id="neural-summary" style="padding:10px; border-radius:4px; font-size:11px; margin-bottom:15px; background: rgba(63, 185, 80, 0.1);">✅ System Stable</div>
            <div id="intel-list"></div>
        </div>
    </aside>

    <main id="app-root">
        <nav id="ribbon-toolbar"><div class="ribbon-track">
            <button class="tool-btn" id="btn-vortex">📁 Files</button>
            <button class="tool-btn" id="btn-intel">🧠 Intel</button>
            <button class="tool-btn" id="btn-sun">☀️ Outdoor</button>
            <button class="tool-btn" id="btn-tab">⇥ Tab</button>
            <button class="tool-btn" id="btn-run" style="color:var(--success)">▶ Run</button>
            <button class="tool-btn" id="btn-cmd">⌨ CMD</button>
        </div></nav>

        <div id="editor-container">
            <div id="gutter">1</div>
            <div id="editor-wrapper"><textarea id="raw-terminal" autocomplete="off" spellcheck="false" placeholder="Write code here..."></textarea></div>
        </div>

        <footer id="status-bar">
            <div id="stat-pos">LN 1, COL 1</div>
            <div id="stat-health">HEALTH: 100%</div>
            <div id="medic-log" style="margin-left: auto; color: var(--gold);">MEDIC: READY</div>
        </footer>
    </main>

    <script type="module">
        import * as acorn from "https://esm.sh/acorn@8.11.3";

        const editor = document.getElementById('raw-terminal');
        const gutter = document.getElementById('gutter');
        const intelList = document.getElementById('intel-list');
        const intelBtn = document.getElementById('btn-intel');

        // --- GLOBAL NEXUS STATE ---
        window.Nexus = {
            log: (msg, color) => {
                const logEl = document.getElementById('medic-log');
                logEl.innerText = msg.toUpperCase();
                logEl.style.color = color || "var(--gold)";
            },
            runFileMedic: function() {
                let code = editor.value;
                let repairs = 0;

                // 1. Tags
                ['b', 'div', 'span', 'i', 'p', 'strong'].forEach(tag => {
                    const open = (code.match(new RegExp(`<${tag}[^>]*>`, 'g')) || []).length;
                    const close = (code.match(new RegExp(`</${tag}>`, 'g')) || []).length;
                    if (open > close) { code += `</${tag}>`.repeat(open - close); repairs++; }
                });

                // 2. JS Braces
                const oB = (code.match(/{/g) || []).length;
                const cB = (code.match(/}/g) || []).length;
                if (oB > cB) { code += '\n' + '}'.repeat(oB - cB); repairs++; }

                // 3. Backticks
                if ((code.match(/`/g) || []).length % 2 !== 0) { code += '`'; repairs++; }

                if (repairs > 0) {
                    const start = editor.selectionStart;
                    editor.value = code;
                    editor.selectionStart = editor.selectionEnd = start; // Restore cursor
                    updateUI();
                    this.log(`🩹 FIXED ${repairs} ISSUES`, "var(--success)");
                } else {
                    this.log("✅ NO ERRORS", "var(--success)");
                }
            }
        };

        const Sentinel = {
            analyze(code) {
                const issues = [];
                try {
                    const ast = acorn.parse(code, { ecmaVersion: 2022, sourceType: 'module', locations: true });
                    this.traverse(ast, (node) => {
                        if (['WhileStatement', 'ForStatement'].includes(node.type) && node.test?.value === true) 
                            issues.push({ severity: 'CRITICAL', message: 'Infinite Loop detected', line: node.loc.start.line });
                    });
                } catch (e) { issues.push({ severity: 'ERROR', message: 'Syntax Error', line: e.loc?.line || '?' }); }
                return issues;
            },
            traverse(node, cb) {
                if (!node) return; cb(node);
                for (let k in node) if (node[k] && typeof node[k] === 'object') {
                    if (Array.isArray(node[k])) node[k].forEach(c => this.traverse(c, cb)); else this.traverse(node[k], cb);
                }
            }
        };

        const updateUI = () => {
            const lines = editor.value.split('\n');
            gutter.innerHTML = lines.map((_, i) => i + 1).join('<br>');
            gutter.scrollTop = editor.scrollTop;

            const textBefore = editor.value.substring(0, editor.selectionStart);
            document.getElementById('stat-pos').innerText = `LN ${textBefore.split('\n').length}, COL ${textBefore.length - textBefore.lastIndexOf('\n')}`;

            const issues = Sentinel.analyze(editor.value);
            intelList.innerHTML = issues.map(i => `<div class="intel-card"><b style="color:var(--danger)">[${i.severity}]</b> Line ${i.line}: ${i.message}</div>`).join('');
            intelBtn.classList.toggle('btn-red', issues.length > 0);
        };

        // Editor Events
        editor.addEventListener('input', updateUI);
        editor.addEventListener('scroll', () => gutter.scrollTop = editor.scrollTop);
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const s = editor.selectionStart;
                editor.value = editor.value.substring(0, s) + "  " + editor.value.substring(editor.selectionEnd);
                editor.selectionStart = editor.selectionEnd = s + 2;
                updateUI();
            }
        });

        // UI Actions
        document.getElementById('btn-medic').onclick = () => window.Nexus.runFileMedic();
        document.getElementById('btn-sun').onclick = () => {
            document.body.classList.toggle('outdoor-mode');
            document.getElementById('btn-sun').innerText = document.body.classList.contains('outdoor-mode') ? "🌑 Indoor" : "☀️ Outdoor";
        };
        document.getElementById('btn-run').onclick = () => {
            try { eval(editor.value); alert("Executed Successfully"); } catch (e) { alert("Error: " + e.message); }
        };
        document.getElementById('btn-vortex').onclick = () => document.getElementById('panel-left').classList.add('open');
        document.getElementById('btn-intel').onclick = () => document.getElementById('panel-right').classList.add('open');
        document.getElementById('btn-cmd').onclick = () => { document.getElementById('cmd-overlay').style.display = 'flex'; document.getElementById('cmd-input').focus(); };
        document.querySelectorAll('.close-btn').forEach(b => b.onclick = () => document.getElementById(b.dataset.target).classList.remove('open'));

        // Swipes
        let startX = 0;
        document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const diffX = e.changedTouches[0].clientX - startX;
            if (startX < 65 && diffX > 60) document.getElementById('panel-left').classList.add('open');
            if (startX > window.innerWidth - 65 && diffX < -60) document.getElementById('panel-right').classList.add('open');
        }, { passive: true });

        // Init
        editor.value = "function devOS() {\n  console.log('Nexus Prime v4.0 Active');\n}";
        updateUI();
    </script>
</body>
</html>
