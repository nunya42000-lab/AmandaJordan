<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML5 Single-File Bundler</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #121212; color: #e0e0e0; padding: 2rem; line-height: 1.5; }
        .card { max-width: 700px; margin: 0 auto; background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .step { margin-bottom: 2rem; padding: 1rem; border-left: 4px solid #444; background: #252525; }
        .step.active { border-left-color: #007bff; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #007bff; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #444; background: #121212; color: white; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; transition: background 0.2s; border: none; }
        button:hover { background: #333; }
        .btn-prep { background: #f39c12; color: #000; }
        .btn-prep:hover { background: #e67e22; }
        .btn-build { background: #27ae60; }
        .btn-build:hover { background: #2ecc71; }
        #log { font-family: monospace; font-size: 0.85rem; color: #888; margin-top: 1rem; max-height: 150px; overflow-y: auto; background: #000; padding: 10px; }
        .file-tag { display: inline-block; background: #333; padding: 2px 8px; border-radius: 4px; margin: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>📦 File Bundler</h1>

    <div class="step">
        <h2>Step 1: Load Resources</h2>
        <input type="file" id="fileInput" multiple accept=".html,.js,.css">
        <div id="fileStatus"></div>
    </div>

    <div class="step">
        <h2>Step 2: Prepare & Minify</h2>
        <p style="font-size: 0.8rem; color: #aaa;">This will strip comments and collapse whitespace from all loaded JS files.</p>
        <button class="btn-prep" onclick="app.minify()">✨ Minify JavaScript</button>
    </div>

    <div class="step">
        <h2>Step 3: Select Master & Build</h2>
        <select id="masterSelect">
            <option value="">-- Choose HTML Master --</option>
        </select>
        <button class="btn-build" onclick="app.build()">🚀 Build Single File</button>
    </div>

    <div id="log">System initialized. Waiting for files...</div>
</div>

<script>
const app = {
    vfs: {}, // Virtual File System

    log(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    },

    init() {
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    this.vfs[file.name] = {
                        content: event.target.result,
                        type: file.name.split('.').pop()
                    };
                    this.log(`Loaded: ${file.name}`);
                    this.updateUI();
                };
                reader.readAsText(file);
            });
        });
    },

    updateUI() {
        const select = document.getElementById('masterSelect');
        const status = document.getElementById('fileStatus');
        
        // Reset
        select.innerHTML = '<option value="">-- Choose HTML Master --</option>';
        status.innerHTML = '';

        Object.keys(this.vfs).forEach(name => {
            const f = this.vfs[name];
            // Update UI list
            status.innerHTML += `<span class="file-tag">${name}</span>`;
            // Update Master selection
            if (f.type === 'html') {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            }
        });
    },

    minify() {
        let count = 0;
        Object.keys(this.vfs).forEach(name => {
            if (this.vfs[name].type === 'js') {
                let code = this.vfs[name].content;
                
                // Simple regex minification:
                // 1. Remove single line comments
                code = code.replace(/\/\/\s?.*$/gm, '');
                // 2. Remove multi-line comments
                code = code.replace(/\/\*[\s\S]*?\*\//g, '');
                // 3. Collapse multiple spaces into one
                code = code.replace(/\s+/g, ' ');
                // 4. Remove spaces around operators
                code = code.replace(/\s?([\{\}\(\)\=\+\-\*\/\,])\s?/g, '$1');
                
                this.vfs[name].content = code.trim();
                count++;
            }
        });
        this.log(`Minified ${count} JS file(s).`);
    },

    build() {
        const masterName = document.getElementById('masterSelect').value;
        if (!masterName) {
            alert("Please select a Master HTML file.");
            return;
        }

        this.log(`Bundling...`);
        let html = this.vfs[masterName].content;

        // 1. Inject CSS
        let cssBundle = "";
        Object.keys(this.vfs).forEach(name => {
            if (this.vfs[name].type === 'css') {
                cssBundle += `\n/* ${name} */\n${this.vfs[name].content}\n`;
            }
        });
        
        // Remove existing link tags and inject bundled CSS
        html = html.replace(/<link.*rel="stylesheet".*?>/gi, '');
        html = html.replace('</head>', `<style>${cssBundle}</style>\n</head>`);

        // 2. Inject JS
        let jsBundle = "";
        Object.keys(this.vfs).forEach(name => {
            if (this.vfs[name].type === 'js') {
                jsBundle += `\n// --- MODULE: ${name} ---\n${this.vfs[name].content}\n`;
            }
        });

        // Remove existing script tags that have 'src' and inject bundled JS
        html = html.replace(/<script.*src=".*?"><\/script>/gi, '');
        html = html.replace('</body>', `<script type="module">${jsBundle}<\/script>\n</body>`);

        this.download(html, `bundled_${masterName}`);
        this.log("Build complete. Check your downloads.");
    },

    download(content, filename) {
        const blob = new Blob([content], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }
};

app.init();
</script>

</body>
</html>
