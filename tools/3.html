<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Responsive Commander Deck</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --border: #30363d;
            --text: #c9d1d9; --accent: #58a6ff; --success: #238636;
            --danger: #da3633; --warning: #d29922;
        }

        /* Lock the viewport */
        html, body { 
            height: 100dvh; width: 100vw; margin: 0; padding: 0; 
            overflow: hidden; overscroll-behavior: none; 
            background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, "Segoe UI", monospace;
        }

        body { display: flex; flex-direction: column; }

        /* --- Global Header --- */
        header {
            background: var(--panel); padding: 10px 15px;
            display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border);
            z-index: 100; flex-shrink: 0;
        }

        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; }
        .btn-success { background: var(--success); color: white; }
        .btn-sec { background: #30363d; color: var(--text); border: 1px solid var(--border); }
        .btn:active { transform: scale(0.95); }

        /* --- Decision Hub (The Controller) --- */
        .hub {
            background: #090c10; padding: 10px; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0;
        }

        .decision-cards { display: flex; gap: 10px; width: 100%; max-width: 1000px; }
        .card { 
            flex: 1; background: var(--panel); border: 2px solid var(--border); 
            border-radius: 8px; overflow: hidden; display: flex; flex-direction: column;
            min-height: 80px; max-height: 180px;
        }
        .card.active { border-color: var(--accent); }
        .card-header { font-size: 9px; padding: 4px 8px; background: #21262d; font-weight: bold; color: #8b949e; text-transform: uppercase; }
        .card-body { padding: 10px; font-size: 12px; white-space: pre-wrap; overflow-y: auto; flex: 1; color: #fff; }

        .btn-choice-l { background: var(--danger); color: white; width: 100%; border-radius: 0; }
        .btn-choice-r { background: var(--success); color: white; width: 100%; border-radius: 0; }

        /* --- The Main Grid --- */
        .grid { display: grid; flex: 1; gap: 1px; background: var(--border); overflow: hidden; }
        
        /* Landscape Mode (The Shine) */
        @media (orientation: landscape) {
            .grid { grid-template-columns: 1fr 1fr 1fr; }
            .decision-cards { flex-direction: row; }
            .mobile-only { display: none; }
        }

        /* Portrait Mode (The Start) */
        @media (orientation: portrait) {
            .grid { grid-template-columns: 1fr; }
            .pane.context { display: none; } /* Hide sources to focus on assembly */
            .decision-cards { flex-direction: column; }
            .card { max-height: 120px; }
            header .logo { font-size: 14px; }
        }

        .pane { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; position: relative; }
        .pane-label { padding: 6px 12px; font-size: 10px; font-weight: bold; background: var(--panel); border-bottom: 1px solid var(--border); color: #8b949e; }
        .view { flex: 1; overflow-y: auto; scroll-behavior: smooth; }

        /* --- Line Styling --- */
        .line { display: flex; font-size: 11px; line-height: 18px; white-space: pre; border-bottom: 1px solid rgba(255,255,255,0.01); }
        .ln { width: 30px; color: #484f58; text-align: right; padding-right: 6px; user-select: none; flex-shrink: 0; }
        .txt { flex: 1; padding-left: 6px; overflow-x: auto; }
        .hunk-active { background: rgba(88, 166, 255, 0.15) !important; outline: 1px solid var(--accent); }

        /* --- Load Overlay --- */
        .overlay { position: absolute; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 15px; }
        .load-box { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 300px; }
        .paste-input { width: 100%; height: 60px; background: #000; color: var(--accent); border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 11px; margin-top: 8px; outline: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="overlay" id="loader">
    <div style="font-weight: 800; color: var(--accent); font-size: 20px; margin-bottom: 10px;">COMMANDER LOAD</div>
    <div class="load-box">
        <label style="font-size: 12px; font-weight: bold;">SOURCE 1 (OLD)</label>
        <input type="file" id="f1" style="font-size: 10px; margin-top: 5px;" onchange="checkInputs()">
        <textarea id="p1" class="paste-input" placeholder="...or paste here" oninput="checkInputs()"></textarea>
    </div>
    <div class="load-box">
        <label style="font-size: 12px; font-weight: bold;">SOURCE 2 (NEW)</label>
        <input type="file" id="f2" style="font-size: 10px; margin-top: 5px;" onchange="checkInputs()">
        <textarea id="p2" class="paste-input" placeholder="...or paste here" oninput="checkInputs()"></textarea>
    </div>
    <button id="start-btn" class="btn btn-success" style="width: 200px; padding: 15px;" onclick="initMerge()" disabled>START MERGING</button>
</div>

<header>
    <div class="logo" style="font-weight: 800; color: var(--accent)">COMMANDER</div>
    <div id="prog-stat" style="font-size: 11px; color: #8b949e">0/0 Diffs</div>
    <button class="btn btn-sec" style="margin-left: auto" onclick="scrubAll()">Scrub Garbage</button>
    <button class="btn btn-success" onclick="copyResult()">COPY</button>
</header>

<div class="hub">
    <div class="decision-cards">
        <div class="card" id="card-l">
            <div class="card-header">LEFT (OLD)</div>
            <div class="card-body" id="body-l"></div>
            <button class="btn btn-choice-l" onclick="pick('l')">KEEP OLD</button>
        </div>
        <div class="card" id="card-r">
            <div class="card-header">RIGHT (NEW)</div>
            <div class="card-body" id="body-r"></div>
            <button class="btn btn-choice-r" onclick="pick('r')">TAKE NEW</button>
        </div>
    </div>
    <div style="display:flex; gap:8px; width: 100%; max-width: 1000px;">
        <button class="btn btn-sec" style="flex:1" onclick="pick('both')">BOTH</button>
        <button class="btn btn-sec" style="flex:1" onclick="pick('skip')">SKIP</button>
        <button class="btn btn-sec" style="flex:1" onclick="undo()">UNDO</button>
    </div>
</div>

<div class="grid">
    <div class="pane context">
        <div class="pane-label">SOURCE 1 CONTEXT</div>
        <div class="view" id="v1"></div>
    </div>
    <div class="pane context">
        <div class="pane-label">SOURCE 2 CONTEXT</div>
        <div class="view" id="v2"></div>
    </div>
    <div class="pane">
        <div class="pane-label" style="color: var(--accent)">FINAL ASSEMBLY</div>
        <div class="view" id="vf"></div>
    </div>
</div>

<script>
    let s1 = "", s2 = "";
    let hunks = [];
    let hIdx = 0;
    let finalStack = [];

    function checkInputs() {
        const ready = (document.getElementById('f1').files[0] || document.getElementById('p1').value) &&
                      (document.getElementById('f2').files[0] || document.getElementById('p2').value);
        document.getElementById('start-btn').disabled = !ready;
    }

    async function initMerge() {
        const file1 = document.getElementById('f1').files[0];
        const file2 = document.getElementById('f2').files[0];
        s1 = file1 ? await file1.text() : document.getElementById('p1').value;
        s2 = file2 ? await file2.text() : document.getElementById('p2').value;
        document.getElementById('loader').classList.add('hidden');
        runEngine();
    }

    function scrubAll() {
        const clean = (t) => t.replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '').replace(/^\s*[\r\n]/gm, '').trim();
        s1 = clean(s1); s2 = clean(s2);
        hIdx = 0; finalStack = [];
        runEngine();
    }

    function runEngine() {
        const diff = Diff.diffLines(s1, s2);
        hunks = [];
        finalStack = [];
        let i = 0;
        
        while (i < diff.length) {
            if (!diff[i].added && !diff[i].removed) {
                finalStack.push({ type: 'match', val: diff[i].value });
                i++;
            } else {
                let hunk = { l: "", r: "" };
                if (diff[i].removed) {
                    hunk.l = diff[i].value;
                    if (diff[i+1] && diff[i+1].added) { hunk.r = diff[i+1].value; i += 2; }
                    else i++;
                } else { hunk.r = diff[i].value; i++; }
                hunks.push(hunk);
            }
        }
        updateUI();
    }

    function updateUI() {
        if (hIdx >= hunks.length) {
            document.querySelector('.hub').innerHTML = "<div style='color:var(--success); font-weight:800; padding: 20px;'>✓ ASSEMBLY COMPLETE</div>";
            renderViews();
            return;
        }

        document.getElementById('body-l').textContent = hunks[hIdx].l || "--- NONE ---";
        document.getElementById('body-r').textContent = hunks[hIdx].r || "--- NONE ---";
        document.getElementById('prog-stat').innerText = `${hIdx + 1} / ${hunks.length} Differences`;
        
        renderViews();
    }

    function renderViews() {
        const draw = (id, text, activeVal) => {
            const el = document.getElementById(id); if(!el) return;
            el.innerHTML = '';
            text.split('\n').forEach((t, i) => {
                const line = document.createElement('div');
                line.className = 'line';
                if (activeVal && activeVal.includes(t)) line.classList.add('hunk-active');
                line.innerHTML = `<div class="ln">${i+1}</div><div class="txt">${escape(t)}</div>`;
                el.appendChild(line);
            });
            const active = el.querySelector('.hunk-active');
            if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };

        const current = hunks[hIdx] || {l:'', r:''};
        draw('v1', s1, current.l);
        draw('v2', s2, current.r);

        const vf = document.getElementById('vf');
        vf.innerHTML = '';
        const built = finalStack.map(s => s.val).join('');
        built.split('\n').forEach((t, i) => {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<div class="ln">${i+1}</div><div class="txt" style="color:var(--accent)">${escape(t)}</div>`;
            vf.appendChild(line);
        });
        vf.scrollTop = vf.scrollHeight;
    }

    function pick(choice) {
        const h = hunks[hIdx];
        let val = "";
        if (choice === 'l') val = h.l;
        else if (choice === 'r') val = h.r;
        else if (choice === 'both') val = h.l + h.r;
        
        finalStack.push({ type: 'choice', val: val, idx: hIdx });
        hIdx++;
        updateUI();
    }

    function undo() {
        if (finalStack.length === 0) return;
        const last = finalStack.pop();
        if (last.type === 'match') return undo();
        hIdx = last.idx;
        updateUI();
    }

    function copyResult() {
        const txt = finalStack.map(s => s.val).join('');
        navigator.clipboard.writeText(txt);
        alert("Assembled code copied!");
    }

    function escape(s) { let d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
