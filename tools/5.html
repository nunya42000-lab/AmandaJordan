<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Video Analyzer v2</title>
    <style>
        body {
            margin: 0;
            background: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #view-container {
            flex: 1;
            position: relative;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .controls {
            padding: 20px;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            border-top: 1px solid #333;
        }
        .button-group {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        #record-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid white;
            background: red;
            color: white;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #pause-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid #ffcc00;
            background: #444;
            color: #ffcc00;
            font-weight: bold;
            display: none; /* Hidden during recording */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #save-btn {
            padding: 10px 15px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            display: none;
        }
        .slider-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type=range] { flex: 1; }
        #speed-label {
            min-width: 45px;
            font-family: monospace;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
        }
        #status { font-size: 0.75rem; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="view-container">
        <video id="main-video" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <div class="slider-container">
            <span>Speed:</span>
            <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0">
            <span id="speed-label">1.0x</span>
        </div>

        <div class="button-group">
            <button id="record-btn">REC</button>
            <button id="pause-btn">PAUSE</button>
            <button id="save-btn">SAVE</button>
        </div>
        
        <div id="status">Ready</div>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const recordBtn = document.getElementById('record-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const saveBtn = document.getElementById('save-btn');
        const speedSlider = document.getElementById('speed-slider');
        const speedLabel = document.getElementById('speed-label');
        const status = document.getElementById('status');

        let mediaRecorder;
        let chunks = [];
        let stream;
        let currentVideoURL = null;

        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "Camera Error";
            }
        }

        function startRecording() {
            if (currentVideoURL) URL.revokeObjectURL(currentVideoURL);
            saveBtn.style.display = "none";
            pauseBtn.style.display = "none";
            chunks = [];
            video.src = "";
            video.srcObject = stream;
            video.muted = true;
            video.play();

            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                currentVideoURL = URL.createObjectURL(blob);
                video.srcObject = null;
                video.src = currentVideoURL;
                video.playbackRate = parseFloat(speedSlider.value);
                video.play();
                saveBtn.style.display = "block";
                pauseBtn.style.display = "block";
                status.innerText = "Playing Back...";
            };
            mediaRecorder.start();
            status.innerText = "Recording...";
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
        }

        // --- PAUSE LOGIC ---
        function holdPause() {
            video.pause();
            status.innerText = "Frozen";
        }

        function releasePause() {
            video.play();
            status.innerText = "Resumed";
        }

        saveBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = currentVideoURL;
            a.download = `clip_${Date.now()}.mp4`;
            a.click();
        };

        speedSlider.oninput = () => {
            speedLabel.innerText = speedSlider.value + "x";
            video.playbackRate = parseFloat(speedSlider.value);
        };

        // Record Listeners
        recordBtn.addEventListener('mousedown', startRecording);
        window.addEventListener('mouseup', (e) => {
            if (e.target !== pauseBtn) stopRecording();
        });
        recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
        recordBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

        // Pause Listeners
        pauseBtn.addEventListener('mousedown', holdPause);
        pauseBtn.addEventListener('mouseup', releasePause);
        pauseBtn.addEventListener('touchstart', (e) => { e.preventDefault(); holdPause(); });
        pauseBtn.addEventListener('touchend', (e) => { e.preventDefault(); releasePause(); });

        initCamera();
    </script>
</body>
</html>
