<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone File Merger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    <style>
        :root {
            --bg: #f4f4f9;
            --panel: #ffffff;
            --added: #e6ffec;
            --removed: #ffebe9;
            --border: #ddd;
            --primary: #2ea44f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .file-input-group {
            background: var(--panel);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .diff-container {
            display: flex;
            flex: 1;
            gap: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
        }

        .pane {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            line-height: 1.5;
            padding: 10px;
        }

        .pane-header {
            position: sticky;
            top: 0;
            background: #eee;
            padding: 5px 10px;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .diff-line {
            display: flex;
            min-height: 20px;
        }

        .line-content {
            flex: 1;
            padding-left: 5px;
        }

        .added { background-color: var(--added); }
        .removed { background-color: var(--removed); }

        .merge-btn {
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 10px;
            margin-right: 5px;
            visibility: hidden;
        }

        .removed .merge-btn { visibility: visible; }

        .btn-main {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-main:hover { opacity: 0.9; }

        footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>
<body>

<header>
    <h2>File Merger Tool</h2>
    <button class="btn-main" onclick="downloadResult()">Download Merged File</button>
</header>

<div class="controls">
    <div class="file-input-group">
        <label><strong>Source File (From)</strong></label>
        <input type="file" id="fileA" onchange="readFile(this, 'A')">
    </div>
    <div class="file-input-group">
        <label><strong>Target File (To)</strong></label>
        <input type="file" id="fileB" onchange="readFile(this, 'B')">
    </div>
</div>

<div class="diff-container">
    <div class="pane" id="paneA">
        <div class="pane-header">Source View</div>
        <div id="contentA"></div>
    </div>
    <div class="pane" id="paneB">
        <div class="pane-header">Target View (Editable)</div>
        <div id="contentB"></div>
    </div>
</div>

<script>
    let textA = "";
    let textB = "";

    async function readFile(input, type) {
        const file = input.files[0];
        if (!file) return;
        const text = await file.text();
        if (type === 'A') textA = text;
        else textB = text;
        
        if (textA && textB) {
            compareFiles();
        } else {
            document.getElementById('content' + type).innerText = text;
        }
    }

    function compareFiles() {
        const diff = Diff.diffLines(textB, textA); // Comparing Target to Source
        const containerB = document.getElementById('contentB');
        containerB.innerHTML = '';

        diff.forEach((part) => {
            const lines = part.value.split('\n');
            if (lines[lines.length - 1] === "") lines.pop();

            lines.forEach((line) => {
                const div = document.createElement('div');
                div.className = 'diff-line' + (part.added ? ' added' : part.removed ? ' removed' : '');
                
                // If it's in Source but NOT in Target (removed from perspective of Target)
                // We show a button to pull it into Target.
                if (part.removed) {
                    const btn = document.createElement('button');
                    btn.innerText = 'ADD →';
                    btn.className = 'merge-btn';
                    btn.onclick = () => mergeLine(div, line);
                    div.appendChild(btn);
                }

                const span = document.createElement('span');
                span.className = 'line-content';
                span.innerText = line;
                div.appendChild(span);
                
                containerB.appendChild(div);
            });
        });
    }

    function mergeLine(element, content) {
        // Change color to indicate it's now part of the file
        element.classList.remove('removed');
        element.classList.add('added');
        // Remove the merge button
        const btn = element.querySelector('.merge-btn');
        if (btn) btn.remove();
    }

    function downloadResult() {
        const lines = document.querySelectorAll('#contentB .diff-line');
        let finalOutput = [];
        
        lines.forEach(line => {
            // We ignore lines that are still marked "removed" (meaning they exist in A but weren't merged to B)
            if (!line.classList.contains('removed')) {
                finalOutput.push(line.querySelector('.line-content').innerText);
            }
        });

        const blob = new Blob([finalOutput.join('\n')], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'merged_file.txt';
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
