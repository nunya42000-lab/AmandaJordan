<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Monolith Bundler</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); border: 1px solid #30363d; border-radius: 8px; max-width: 600px; width: 100%; padding: 30px; }
        h1 { font-size: 20px; color: white; margin-bottom: 8px; }
        .drop-zone { border: 2px dashed #30363d; border-radius: 6px; padding: 40px; text-align: center; cursor: pointer; margin: 20px 0; transition: 0.3s; }
        .drop-zone:hover { border-color: #58a6ff; background: #1f242c; }
        #fileInput { display: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 15px; font-family: monospace; font-size: 12px; color: #8b949e; height: 100px; overflow-y: auto; background: #010409; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Nexus Monolith Bundler</h1>
    <p>Merge a multi-module PWA into one functional HTML file.</p>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="label">Click to select your PWA project folder</span>
        <input type="file" id="fileInput" webkitdirectory directory multiple>
    </div>

    <button id="bundleBtn" disabled>Generate Monolith</button>
    <div id="status">Ready...</div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const bundleBtn = document.getElementById('bundleBtn');
    const status = document.getElementById('status');
    const label = document.getElementById('label');

    let projectVFS = {};

    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        projectVFS = {};
        status.innerHTML = "Indexing files...<br>";

        for (const file of files) {
            // Shake the tree: ignore junk
            if (file.webkitRelativePath.includes('node_modules') || file.name.startsWith('.')) continue;

            const path = file.webkitRelativePath.split('/').slice(1).join('/');
            const isBinary = file.type.startsWith('image/') || file.type.includes('font') || file.type.includes('icon');
            
            if (isBinary) {
                projectVFS[path] = { content: await toBase64(file), type: file.type, binary: true };
            } else {
                projectVFS[path] = { content: await file.text(), type: file.type, binary: false };
            }
            status.innerHTML += `Added: ${path}<br>`;
            status.scrollTop = status.scrollHeight;
        }

        label.innerText = `${Object.keys(projectVFS).length} files loaded.`;
        bundleBtn.disabled = false;
    };

    const toBase64 = f => new Promise(res => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.readAsDataURL(f);
    });

    bundleBtn.onclick = () => {
        const entryPoint = Object.keys(projectVFS).find(k => k.toLowerCase() === 'index.html');
        if (!entryPoint) return alert("index.html not found!");

        // The Magic Bootstrapper
        const bootstrapper = `
<script>
(async function() {
    window._VFS = ${JSON.stringify(projectVFS)};
    const blobMap = new Map();

    // 1. Convert VFS strings/base64 into actual Blobs/URLs
    for (const [path, file] of Object.entries(window._VFS)) {
        let blob;
        if (file.binary) {
            const res = await fetch(file.content);
            blob = await res.blob();
        } else {
            blob = new Blob([file.content], { type: file.type });
        }
        blobMap.set(path, URL.createObjectURL(blob));
    }

    // 2. Intercept Fetch
    const _fetch = window.fetch;
    window.fetch = async (url, init) => {
        const path = url.toString().replace(window.location.origin + '/', '');
        if (blobMap.has(path)) return _fetch(blobMap.get(path));
        return _fetch(url, init);
    };

    // 3. Update DOM (Images, Scripts, Links)
    function syncDOM() {
        document.querySelectorAll('[src], [href], [data-src]').forEach(el => {
            ['src', 'href', 'data-src'].forEach(attr => {
                if (el.hasAttribute(attr)) {
                    const original = el.getAttribute(attr);
                    if (blobMap.has(original)) el[attr] = blobMap.get(original);
                }
            });
        });
    }

    // 4. Handle Modules (Dynamic Imports)
    // We rewrite the DOM entry point to start the app
    const observer = new MutationObserver(syncDOM);
    observer.observe(document.documentElement, { subtree: true, attributes: true });
    
    window.addEventListener('DOMContentLoaded', syncDOM);
})();
<\/script>`;

        let finalHtml = projectVFS[entryPoint].content;
        
        // Inject the bootstrapper at the top of the head
        if (finalHtml.includes('<head>')) {
            finalHtml = finalHtml.replace('<head>', '<head>' + bootstrapper);
        } else {
            finalHtml = bootstrapper + finalHtml;
        }

        const blob = new Blob([finalHtml], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'pwa-monolith.html';
        a.click();
        status.innerHTML += "<br><b>Success! Monolith downloaded.</b>";
    };
</script>
</body>
</html>
